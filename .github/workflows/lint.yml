name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          ruff check \
            core \
            report_parser \
            taxonomy_scorer \
            esg_frameworks \
            techno_economics \
            benchmark \
            tests \
            main.py \
            --ignore E501
