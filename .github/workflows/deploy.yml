name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Validate deploy secrets
        id: deploy_secrets
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_DEPLOY_KEY }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping VPS deploy: set VPS_HOST and VPS_DEPLOY_KEY repository secrets."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to USA VPS
        if: steps.deploy_secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/esg-research-toolkit

            echo "→ Pull latest code"
            git pull origin main

            echo "→ Run unified deploy script"
            bash scripts/deploy.sh

            echo "→ Health check"
            for i in $(seq 1 10); do
              curl -sf http://127.0.0.1:8001/health && echo " ✓ Deploy complete" && exit 0
              echo "  waiting... ($i/10)"
              sleep 3
            done
            echo "✗ Health check failed" && exit 1

      - name: Deploy skipped (missing secrets)
        if: steps.deploy_secrets.outputs.ready != 'true'
        run: echo "Deploy step skipped because required secrets are not configured."
