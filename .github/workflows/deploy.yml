name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      public_health_url:
        description: "Optional public /health/deploy URL to verify after deploy"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout deployed revision
        uses: actions/checkout@v4

      - name: Check version consistency
        run: python scripts/check_version_consistency.py

      - name: Validate deploy secrets
        id: deploy_secrets
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_DEPLOY_KEY }}" ] || [ -z "${{ secrets.VPS_DEPLOY_USER }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping VPS deploy: set VPS_HOST, VPS_DEPLOY_USER, and VPS_DEPLOY_KEY repository secrets."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to USA VPS
        if: steps.deploy_secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_DEPLOY_USER }}
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          envs: GITHUB_SHA
          script: |
            set -e
            cd /opt/esg-research-toolkit

            echo "→ Fetch requested revision"
            git fetch --depth=1 origin "$GITHUB_SHA"
            git checkout --detach "$GITHUB_SHA"

            echo "→ Run unified deploy script"
            bash scripts/deploy.sh

            echo "→ Health check"
            for i in $(seq 1 10); do
              curl -sf http://127.0.0.1:8001/health && echo " ✓ Deploy complete" && exit 0
              echo "  waiting... ($i/10)"
              sleep 3
            done
            echo "✗ Health check failed" && exit 1

      - name: Verify public deploy fingerprint
        if: steps.deploy_secrets.outputs.ready == 'true' && inputs.public_health_url != ''
        env:
          PUBLIC_HEALTH_URL: ${{ inputs.public_health_url }}
          EXPECTED_GITHUB_SHA: ${{ github.sha }}
        run: |
          payload="$(curl -fsS "$PUBLIC_HEALTH_URL")"
          echo "$payload"
          python - <<'PY' "$payload"
          import json
          import os
          import sys

          payload = json.loads(sys.argv[1])
          expected = os.environ["EXPECTED_GITHUB_SHA"]
          actual = payload.get("git_sha")
          if actual != expected:
              raise SystemExit(f"public deploy git_sha mismatch: expected {expected}, got {actual}")
          PY

      - name: Deploy skipped (missing secrets)
        if: steps.deploy_secrets.outputs.ready != 'true'
        run: echo "Deploy step skipped because required secrets are not configured."
