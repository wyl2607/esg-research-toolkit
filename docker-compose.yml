services:
  api:
    build:
      context: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: sqlite:///./data/esg_toolkit.db
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
